name: GKE Deploy — Ticket Booking Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  REPO: ticket-booking

jobs:
  # ─── Job 1: Build & test .NET backend ──────────────────────────────────────
  build-backend:
    name: Build .NET Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore & build
        run: |
          dotnet restore TicketBooking.sln
          dotnet build TicketBooking.sln -c Release --no-restore

  # ─── Job 2: Build & test React frontend ────────────────────────────────────
  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/ticket-booking-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/ticket-booking-ui/package-lock.json

      - name: Install & build
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ""   # relative URLs for production (Ingress routes /api/* to gateway)

  # ─── Job 3: Build Docker images & push to Artifact Registry ────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push — user-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/TicketBooking.UserService/Dockerfile
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/user-service:${{ github.sha }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — event-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/TicketBooking.EventService/Dockerfile
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/event-service:${{ github.sha }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/event-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — booking-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/TicketBooking.BookingService/Dockerfile
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/booking-service:${{ github.sha }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/booking-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — payment-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/TicketBooking.PaymentService/Dockerfile
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/payment-service:${{ github.sha }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/payment-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — notification-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/TicketBooking.NotificationService/Dockerfile
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/notification-service:${{ github.sha }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/notification-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — api-gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: gateway/TicketBooking.Gateway/Dockerfile
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/api-gateway:${{ github.sha }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend/ticket-booking-ui
          file: frontend/ticket-booking-ui/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/frontend:${{ github.sha }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 4: Deploy to GKE ───────────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Substitute image tags in k8s manifests
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          find k8s/ -name "*.yaml" -exec \
            sed -i \
              -e "s|GCP_PROJECT_ID|${PROJECT_ID}|g" \
              -e "s|IMAGE_TAG|${IMAGE_TAG}|g" \
            {} \;

      - name: Ensure namespace exists
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create / update k8s secrets
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASS: ${{ secrets.RABBITMQ_PASS }}
        run: |
          kubectl create secret generic app-secrets \
            --from-literal=POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
            --from-literal=JWT_SECRET="${JWT_SECRET}" \
            --from-literal=RABBITMQ_USER="${RABBITMQ_USER}" \
            --from-literal=RABBITMQ_PASS="${RABBITMQ_PASS}" \
            --namespace=ticket-booking \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply ConfigMap
        run: kubectl apply -f k8s/configmap/

      - name: Apply infrastructure (databases, Redis, RabbitMQ)
        run: kubectl apply -f k8s/infrastructure/

      - name: Apply microservices
        run: kubectl apply -f k8s/services/

      - name: Apply API Gateway
        run: kubectl apply -f k8s/gateway/

      - name: Apply Frontend
        run: kubectl apply -f k8s/frontend/

      - name: Apply HPA
        run: kubectl apply -f k8s/hpa/

      - name: Apply Ingress
        run: kubectl apply -f k8s/ingress/

      - name: Wait for microservice rollouts
        run: |
          kubectl rollout status deployment/user-service -n ticket-booking --timeout=300s
          kubectl rollout status deployment/event-service -n ticket-booking --timeout=300s
          kubectl rollout status deployment/booking-service -n ticket-booking --timeout=300s
          kubectl rollout status deployment/payment-service -n ticket-booking --timeout=300s
          kubectl rollout status deployment/notification-service -n ticket-booking --timeout=300s
          kubectl rollout status deployment/api-gateway -n ticket-booking --timeout=300s
          kubectl rollout status deployment/frontend -n ticket-booking --timeout=300s

      - name: Show deployment status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ticket-booking
          echo ""
          echo "=== Services ==="
          kubectl get svc -n ticket-booking
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n ticket-booking
