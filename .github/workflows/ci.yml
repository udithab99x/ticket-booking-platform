name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    name: Build .NET Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore TicketBooking.sln

      - name: Build solution
        run: dotnet build TicketBooking.sln -c Release --no-restore

  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/ticket-booking-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/ticket-booking-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000

  docker-build-check:
    name: Docker Compose Build Check
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          echo "POSTGRES_PASSWORD=ci_password" > .env
          echo "JWT_SECRET=CI-TestSecret-AtLeast32CharactersLong!" >> .env

      - name: Docker Compose build (no push)
        run: docker compose build
