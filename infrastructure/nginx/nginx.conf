# ─── NGINX Load Balancer for local Docker Compose ────────────────────────────
# For local dev: single booking-service instance.
# In GKE: this file is not used — Kubernetes Service load-balances natively
#          across the 3 booking-service pods managed by the HPA.
# To demo horizontal scaling locally:
#   docker compose up --scale booking-service=3 -d
#   Then update this upstream to add booking-service-1:8080 etc.
upstream booking_backend {
    server booking-service:8080;
}

server {
    listen 80;

    location / {
        proxy_pass http://booking_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}
