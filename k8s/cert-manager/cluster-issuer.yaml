# ─── cert-manager ClusterIssuer — Let's Encrypt Production ───────────────────
# Enables automatic HTTPS certificates for *.nip.io domains via ACME HTTP-01.
# Apply AFTER cert-manager is installed and BEFORE applying the Ingress.
# Replace the email with your actual email address.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: your-email@example.com   # <-- replace with your email
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
