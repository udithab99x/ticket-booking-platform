# ─── BookingService Deployment + Service ─────────────────────────────────────
# 3 replicas – Kubernetes Service provides native load balancing across pods.
# HPA in k8s/hpa/booking-service-hpa.yaml scales this between 2–5 replicas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: ticket-booking
  labels:
    app: booking-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: us-central1-docker.pkg.dev/GCP_PROJECT_ID/ticket-booking/booking-service:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: ConnectionStrings__BookingDb
              value: "Host=postgres-bookings;Port=5432;Database=bookings_db;Username=postgres;Password=$(POSTGRES_PASSWORD)"
            - name: ConnectionStrings__Redis
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_CONNECTION
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: Jwt__Issuer
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JWT_ISSUER
            - name: Jwt__Audience
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JWT_AUDIENCE
            - name: RabbitMq__Host
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: RABBITMQ_HOST
            - name: RabbitMq__Username
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RABBITMQ_USER
            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RABBITMQ_PASS
            - name: Services__EventService
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: EVENT_SERVICE_URL
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - 'sh'
            - '-c'
            - |
              until nc -z postgres-bookings 5432; do echo waiting for postgres-bookings; sleep 2; done
              until nc -z redis 6379; do echo waiting for redis; sleep 2; done
              until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: ticket-booking
  labels:
    app: booking-service
spec:
  selector:
    app: booking-service
  ports:
    - port: 8080
      targetPort: 8080
