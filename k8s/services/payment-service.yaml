# ─── PaymentService Deployment + Service ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: ticket-booking
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: us-central1-docker.pkg.dev/GCP_PROJECT_ID/ticket-booking/payment-service:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: ConnectionStrings__PaymentDb
              value: "Host=postgres-payments;Port=5432;Database=payments_db;Username=postgres;Password=$(POSTGRES_PASSWORD)"
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: Jwt__Issuer
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JWT_ISSUER
            - name: Jwt__Audience
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JWT_AUDIENCE
            - name: RabbitMq__Host
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: RABBITMQ_HOST
            - name: RabbitMq__Username
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RABBITMQ_USER
            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RABBITMQ_PASS
            - name: Services__BookingService
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: BOOKING_SERVICE_URL
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - 'sh'
            - '-c'
            - |
              until nc -z postgres-payments 5432; do echo waiting for postgres-payments; sleep 2; done
              until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: ticket-booking
  labels:
    app: payment-service
spec:
  selector:
    app: payment-service
  ports:
    - port: 8080
      targetPort: 8080
